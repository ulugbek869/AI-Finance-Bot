<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Sky Blue to Telegram Blue -->
    <linearGradient id="telegram-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#54b4f3" />
      <stop offset="100%" stop-color="#187ec2" />
    </linearGradient>
    <!-- Trendline Gradient: Neon Green to Light Green -->
    <linearGradient id="neon-green" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Circle Background -->
  <circle cx="50" cy="50" r="50" fill="url(#telegram-blue)" />

  <!-- Outer Ring decorative border -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.2" stroke-dasharray="4 3" />

  <!-- Trendline (Financial Growth Chart) behind the F -->
  <path d="M22,70 L38,56 L55,62 L78,35" fill="none" stroke="url(#neon-green)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon-glow)" />
  <path d="M68,35 L78,35 L78,45" fill="none" stroke="url(#neon-green)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon-glow)" />

  <!-- The Letter F (Bold, Clean, Friendly) -->
  <!-- Stem -->
  <path d="M43,30 L43,70" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
  <!-- Top bar -->
  <path d="M43,30 L66,30" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
  <!-- Middle bar -->
  <path d="M43,48 L58,48" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />

  <!-- AI Sparks/Stars representing Intelligence -->
  <!-- Star 1 -->
  <path d="M80,20 L81.5,23.5 L85,25 L81.5,26.5 L80,30 L78.5,26.5 L75,25 L78.5,23.5 Z" fill="#ffd93d" />
  <!-- Star 2 (Smaller) -->
  <path d="M25,28 L26,30.5 L28.5,31.5 L26,32.5 L25,35 L24,32.5 L21.5,31.5 L24,30.5 Z" fill="#ffffff" opacity="0.8" />
</svg>
